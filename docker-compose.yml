version: '3.8'

services:
  web-server:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html
    restart: always


  logs-monitor:
    image: amir20/dozzle:latest
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
